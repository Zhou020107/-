name: 打包 Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 APK 构建依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: 安装 Python 依赖
        run: |
          pip install -r flet_mobile/requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: 构建 APK
        run: |
          flet build apk \
            --app-name "就业信息采集" \
            --package-name "com.jobscraper.app" \
            --product-name "就业信息采集" \
            --org "jobscraper" \
            --module-name flet_app

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 就业信息采集-APK
          path: build/apk/release/*.apk
          retention-days: 30
