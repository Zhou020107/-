# 职位爬虫工具配置文件
# 修改此文件后重启应用即可生效

# 目标网站设置
sites:
  51job:
    enabled: true
    base_url: "https://we.51job.com"
    encoding: "utf-8"
    use_browser: true

  ncss:
    enabled: true
    base_url: "https://24365.smartedu.cn"
    encoding: "utf-8"
    use_browser: false

  boss_zhipin:
    enabled: false
    base_url: "https://www.zhipin.com"
    encoding: "utf-8"
    use_browser: true

  zhilian:
    enabled: false
    base_url: "https://www.zhaopin.com"
    encoding: "utf-8"
    use_browser: true

# 爬取限制
scraping:
  max_pages_per_site: 10        # 每个网站最多爬取页数
  min_delay_seconds: 1          # 请求间隔最小秒数
  max_delay_seconds: 3          # 请求间隔最大秒数
  timeout_seconds: 30           # 请求超时秒数

# 默认搜索参数
defaults:
  max_pages: 5                  # 默认爬取页数
  location: ""                  # 默认地点（留空=全国）

# 反检测设置
stealth:
  headless: true                # 是否使用无头浏览器
  rotate_user_agent: true       # 是否轮换 User-Agent
  simulate_human: true          # 是否模拟人类操作延迟

# 自定义技术栈关键词（可用于添加任意行业）
# 格式: "领域名": ["关键词1", "关键词2", ...]
tech_keywords:
  custom:
    新能源: ["光伏", "风电", "储能", "锂电池", "新能源汽车", "充电桩", "碳中和"]
    农业: ["种植", "养殖", "农药", "育种", "温室", "灌溉", "农艺"]
    酒店餐饮: ["前厅", "客房", "厨师", "服务员", "大堂经理", "fbs", "调酒"]
    房地产: ["房产销售", "置业顾问", "物业", "楼盘", "中介", "租赁"]
